spi:
  - id: spi_max7219digit
    clk_pin: 2
    mosi_pin: 3
    miso_pin: 4

display:
  - platform: max7219digit
    cs_pin: 6
    num_chips: 4
    rotate_chip: 0
    intensity: 10
    scroll_mode: STOP
    id: my_matrix
    lambda: |-
      it.printdigit("hello");

binary_sensor:
  - platform: gpio
    pin: GPIO00
    name: None
    on_press:
      then:
        - MAX7219.invert_off: my_matrix
        - MAX7219.invert_on: my_matrix

        - MAX7219.turn_off: my_matrix
        - MAX7219.turn_on: my_matrix

        - MAX7219.reverse_off: my_matrix
        - MAX7219.reverse_on: my_matrix

        - MAX7219.intensity:
            id: my_matrix
            intensity: 4
