esphome:
  name: livingroomdevice
  friendly_name: Living Room Device
  area: Living Room

wifi:
  ssid: MySSID
  password: password1

sensor:
  - platform: template
    id: template_sensor1
    lambda: |-
      if (millis() > 10000) {
        return 42.0;
      } else {
        return 0.0;
      }
    update_interval: 60s

text_sensor:
  - platform: version
    name: "ESPHome Version"
    hide_timestamp: true
  - platform: template
    id: template_text_sensor1
    lambda: |-
      if (millis() > 10000) {
        return {"Hello World"};
      } else {
        return {"Goodbye (cruel) World"};
      }
    update_interval: 60s

binary_sensor:
  - platform: template
    id: template_binary_sensor1
    lambda: |-
      if (millis() > 10000) {
        return true;
      } else {
        return false;
      }

switch:
  - platform: template
    id: template_switch1
    lambda: |-
      if (millis() > 10000) {
        return true;
      } else {
        return false;
      }
    optimistic: true

fan:
  - platform: template
    id: template_fan1

cover:
  - platform: template
    id: template_cover1
    lambda: |-
      if (millis() > 10000) {
        return COVER_OPEN;
      } else {
        return COVER_CLOSED;
      }

lock:
  - platform: template
    id: template_lock1
    lambda: |-
      if (millis() > 10000) {
        return LOCK_STATE_LOCKED;
      } else {
        return LOCK_STATE_UNLOCKED;
      }
    optimistic: true

select:
  - platform: template
    id: template_select1
    name: "Template select"
    optimistic: true
    options:
      - one
      - two
      - three
    initial_option: two

number:
  - platform: template
    id: template_number1
    name: "Template number"
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1

i2s_audio:
  i2s_lrclk_pin: 13
  i2s_bclk_pin: 14
  i2s_mclk_pin: 15

media_player:
  - platform: i2s_audio
    name: None
    dac_type: external
    i2s_dout_pin: 18
    mute_pin: 19
    on_state:
      - media_player.play:
      - media_player.play_media: http://localhost/media.mp3
      - media_player.play_media: !lambda 'return "http://localhost/media.mp3";'
    on_idle:
      - media_player.pause:
    on_play:
      - media_player.stop:
    on_pause:
      - media_player.toggle:
      - wait_until:
          media_player.is_idle:
      - wait_until:
          media_player.is_playing:
      - wait_until:
          media_player.is_announcing:
      - wait_until:
          media_player.is_paused:
      - media_player.volume_up:
      - media_player.volume_down:
      - media_player.volume_set: 50%

prometheus:
  include_internal: true
  relabel:
    template_sensor1:
      id: hellow_world
      name: Hello World
    template_text_sensor1:
      id: hello_text
      name: Text Substitution
