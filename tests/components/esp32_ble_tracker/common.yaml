esphome:
  on_boot:
    then:
      - esp32_ble_tracker.start_scan
      - esp32_ble_tracker.stop_scan

esp32_ble_tracker:
  on_ble_advertise:
    - mac_address:
        - AA:BB:CC:DD:EE:FF
        - FF:EE:DD:CC:BB:AA
      then:
        # yamllint disable rule:line-length
        - lambda: !lambda |-
            ESP_LOGD("main", "The device address (%s) exists in list", x.address_str().c_str());
        # yamllint enable rule:line-length
    - mac_address: AC:37:43:77:5F:4C
      then:
        # yamllint disable rule:line-length
        - lambda: !lambda |-
            ESP_LOGD("main", "The device address is %s", x.address_str().c_str());
        # yamllint enable rule:line-length
    - then:
        # yamllint disable rule:line-length
        - lambda: !lambda |-
            ESP_LOGD("main", "The device address is %s", x.address_str().c_str());
        # yamllint enable rule:line-length
  on_ble_service_data_advertise:
    - service_uuid: ABCD
      then:
        - lambda: !lambda |-
            ESP_LOGD("main", "Length of service data is %i", x.size());
  on_ble_manufacturer_data_advertise:
    - manufacturer_id: ABCD
      then:
        - lambda: !lambda |-
            ESP_LOGD("main", "Length of manufacturer data is %i", x.size());
  on_scan_end:
    - then:
        - lambda: |-
             ESP_LOGD("ble_auto", "The scan has ended!");

wifi:
  ssid: MySSID
  password: password1

http_request:
  useragent: esphome/tagreader
  timeout: 10s
  verify_ssl: false

ota:
  - platform: http_request
    on_begin:
      then:
        - logger.log: "OTA start"
    on_progress:
      then:
        - logger.log:
            format: "OTA progress %0.1f%%"
            args: ["x"]
    on_end:
      then:
        - logger.log: "OTA end"
    on_error:
      then:
        - logger.log:
            format: "OTA update error %d"
            args: ["x"]
    on_state_change:
      then:
        lambda: 'ESP_LOGD("ota", "State %d", state);'

button:
  - platform: template
    name: Firmware update
    on_press:
      then:
        - ota.http_request.flash:
            md5_url: http://my.ha.net:8123/local/esphome/firmware.md5
            url: http://my.ha.net:8123/local/esphome/firmware.bin

        - ota.http_request.flash:
            md5: 0123456789abcdef0123456789abcdef
            url: http://my.ha.net:8123/local/esphome/firmware.bin

        - logger.log: "This message should be not displayed (reboot)"

update:
  - platform: http_request
    name: OTA Update
    id: ota_update
    source: http://my.ha.net:8123/local/esphome/manifest.json
