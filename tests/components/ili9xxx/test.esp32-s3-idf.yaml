spi:
  - id: spi_id_1
    type: single
    clk_pin:
      number: GPIO0
      ignore_strapping_warning: true
      allow_other_uses: false
    mosi_pin: GPIO6
    interface: hardware

display:
  - platform: ili9xxx
    id: wave_disp
    model: WAVESHARE_RES_3_5
    transform:
      mirror_y: true
      swap_xy: true
    cs_pin: GPIO5
    dc_pin: GPIO12
    reset_pin: GPIO21
    spi_mode: mode0
    invert_colors: false
    data_rate: 20MHz
    color_order: bgr
    auto_clear_enabled: false
    lambda: !lambda |-
      it.filled_rectangle(0, 0, 40, 40, Color(0x80, 0, 0));
      it.filled_rectangle(0, 60, 40, 40, Color(0x40, 0, 0));
      it.filled_rectangle(0, 120, 40, 40, Color(0x20, 0, 0));
